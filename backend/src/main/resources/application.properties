spring.application.name=TaskAutomation

# Database configuration (Supabase Postgres)
# Supabase pooler can conflict with PostgreSQL server-side prepared statements.
# Disable them in the JDBC driver to avoid "prepared statement already exists".
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0&preparedStatementCacheQueries=0}
spring.datasource.username=postgres.anfuzydrqpcppugeviga
spring.datasource.password=Zinbya2905.

spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Authentication
app.jwtSecret=${JWT_SECRET:TaskAutomationSuperSecretKeyForJwtSigning1234567890!@#$}
app.jwtExpirationMs=86400000

# SQL initialization is off by default for cloud databases.
# Use the provided Supabase seed script manually when you want demo data.
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# URL webhook n8n production. Co the override bang env tren VPS.
n8n.webhook.url=${N8N_WEBHOOK_URL:https://n8nserver.email/webhook/task-events}
n8n.ai.webhook.url=${N8N_AI_WEBHOOK_URL:https://n8nserver.email/webhook/ai-generate-subtask}

# Shared secret between n8n and backend webhook endpoints
app.webhookSecret=${APP_WEBHOOK_SECRET:local-n8n-sync-secret}
